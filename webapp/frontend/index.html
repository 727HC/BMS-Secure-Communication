<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battery Passport Platform</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    [v-cloak] { display: none; }
    .fade-enter-active, .fade-leave-active { transition: opacity 0.2s; }
    .fade-enter-from, .fade-leave-to { opacity: 0; }

    /* Sidebar scrollbar */
    .sidebar-scroll::-webkit-scrollbar { width: 4px; }
    .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.25); border-radius: 2px; }
    .sidebar-scroll::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,0.4); }

    /* Mobile overlay backdrop */
    .sidebar-overlay {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(2px);
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50:'#ecfdf5',100:'#d1fae5',200:'#a7f3d0',300:'#6ee7b7',400:'#34d399',500:'#10b981',600:'#059669',700:'#047857',800:'#065f46',900:'#064e3b' },
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="app" v-cloak>

    <!-- ===== LOGIN: Full-screen, no sidebar ===== -->
    <template v-if="currentPage === 'login'">
      <main class="min-h-screen">
        <component :is="currentPageComponent"
          :auth="auth"
          :api="api"
          @navigate="navigate"
          @login="onLogin">
        </component>
      </main>
    </template>

    <!-- ===== AUTHENTICATED: Sidebar + Top Bar + Content ===== -->
    <template v-else>
      <div class="flex h-screen overflow-hidden">

        <!-- Mobile sidebar overlay -->
        <div v-if="mobileMenuOpen"
          class="fixed inset-0 z-40 sidebar-overlay lg:hidden"
          @click="mobileMenuOpen = false"></div>

        <!-- ===== SIDEBAR ===== -->
        <aside :class="[
          'fixed inset-y-0 left-0 z-50 w-60 bg-white border-r border-gray-200 flex flex-col transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:z-auto',
          mobileMenuOpen ? 'translate-x-0' : '-translate-x-full'
        ]">

          <!-- Logo Area -->
          <div class="flex items-center px-5 h-16 flex-shrink-0 border-b border-gray-200">
            <div class="flex items-center space-x-3 cursor-pointer" @click="navigate('dashboard')">
              <div class="w-8 h-8 bg-emerald-600 rounded-lg flex items-center justify-center flex-shrink-0">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="6" y="2" width="12" height="20" rx="2" ry="2"/>
                  <line x1="6" y1="6" x2="18" y2="6"/>
                  <line x1="6" y1="18" x2="18" y2="18"/>
                  <path d="M12 9v6"/>
                  <path d="M9 12h6"/>
                </svg>
              </div>
              <div class="min-w-0">
                <div class="text-slate-800 font-semibold text-sm leading-tight truncate">Battery Passport</div>
                <div class="text-slate-400 text-xs leading-tight">GBA 21 Platform</div>
              </div>
            </div>
          </div>

          <!-- Navigation -->
          <nav class="flex-1 overflow-y-auto sidebar-scroll px-3 py-4 space-y-1">
            <template v-for="(group, gi) in groupedNavItems" :key="gi">
              <!-- Section label -->
              <div v-if="group.section" class="px-3 pt-4 pb-1.5 first:pt-0">
                <span class="text-[10px] font-semibold uppercase tracking-wider text-slate-400">{{ group.section }}</span>
              </div>

              <!-- Nav items -->
              <button v-for="item in group.items" :key="item.route"
                @click="navigate(item.route)"
                :class="[
                  'group w-full flex items-center space-x-3 px-3 py-2 rounded-lg text-sm font-medium transition-all duration-150',
                  currentPage === item.route
                    ? 'bg-emerald-50 text-emerald-700 border-l-2 border-emerald-600 pl-[10px]'
                    : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900 border-l-2 border-transparent pl-[10px]'
                ]">
                <!-- Dashboard icon -->
                <svg v-if="item.icon === 'dashboard'" class="w-[18px] h-[18px] flex-shrink-0" :class="currentPage === item.route ? 'text-emerald-600' : 'text-gray-400 group-hover:text-gray-600'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="7" height="7" rx="1"/>
                  <rect x="14" y="3" width="7" height="7" rx="1"/>
                  <rect x="3" y="14" width="7" height="7" rx="1"/>
                  <rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
                <!-- Passport icon -->
                <svg v-else-if="item.icon === 'passport'" class="w-[18px] h-[18px] flex-shrink-0" :class="currentPage === item.route ? 'text-emerald-600' : 'text-gray-400 group-hover:text-gray-600'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                  <line x1="16" y1="13" x2="8" y2="13"/>
                  <line x1="16" y1="17" x2="8" y2="17"/>
                  <polyline points="10 9 9 9 8 9"/>
                </svg>
                <!-- Chain / traceability icon -->
                <svg v-else-if="item.icon === 'chain'" class="w-[18px] h-[18px] flex-shrink-0" :class="currentPage === item.route ? 'text-emerald-600' : 'text-gray-400 group-hover:text-gray-600'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
                  <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
                </svg>
                <!-- Pulse / data icon -->
                <svg v-else-if="item.icon === 'pulse'" class="w-[18px] h-[18px] flex-shrink-0" :class="currentPage === item.route ? 'text-emerald-600' : 'text-gray-400 group-hover:text-gray-600'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                </svg>
                <!-- Wrench / service icon -->
                <svg v-else-if="item.icon === 'wrench'" class="w-[18px] h-[18px] flex-shrink-0" :class="currentPage === item.route ? 'text-emerald-600' : 'text-gray-400 group-hover:text-gray-600'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
                </svg>
                <!-- Recycle icon -->
                <svg v-else-if="item.icon === 'recycle'" class="w-[18px] h-[18px] flex-shrink-0" :class="currentPage === item.route ? 'text-emerald-600' : 'text-gray-400 group-hover:text-gray-600'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="7 2 12 7 7 12"/>
                  <path d="M12 7H3a1 1 0 00-1 1v4"/>
                  <polyline points="17 22 12 17 17 12"/>
                  <path d="M12 17h9a1 1 0 001-1v-4"/>
                  <polyline points="2 17 7 12"/>
                  <polyline points="22 7 17 12"/>
                </svg>
                <!-- Audit icon -->
                <svg v-else-if="item.icon === 'audit'" class="w-[18px] h-[18px] flex-shrink-0" :class="currentPage === item.route ? 'text-emerald-600' : 'text-gray-400 group-hover:text-gray-600'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/>
                </svg>
                <!-- QR icon -->
                <svg v-else-if="item.icon === 'qr'" class="w-[18px] h-[18px] flex-shrink-0" :class="currentPage === item.route ? 'text-emerald-600' : 'text-gray-400 group-hover:text-gray-600'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                  <line x1="14" y1="14" x2="14" y2="14.01"/><line x1="21" y1="14" x2="21" y2="14.01"/><line x1="14" y1="21" x2="14" y2="21.01"/><line x1="21" y1="21" x2="21" y2="21.01"/><line x1="17.5" y1="17.5" x2="17.5" y2="17.51"/>
                </svg>
                <span class="truncate">{{ item.label }}</span>
                <span v-if="navBadges[item.route]"
                  class="ml-auto inline-flex items-center justify-center min-w-[18px] h-[18px] px-1 rounded-full text-[10px] font-bold text-white bg-red-500 leading-none">
                  {{ navBadges[item.route] }}
                </span>
              </button>
            </template>
          </nav>

          <!-- User section at bottom -->
          <div class="flex-shrink-0 border-t border-gray-200 p-4">
            <div class="flex items-center space-x-3">
              <!-- Avatar -->
              <div :class="['w-9 h-9 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0', orgAvatarColor]">
                {{ userInitials }}
              </div>
              <!-- Info -->
              <div class="min-w-0 flex-1">
                <div class="text-sm font-medium text-slate-800 truncate">{{ auth.userId }}</div>
                <span :class="['inline-block mt-0.5 px-1.5 py-0.5 rounded text-[10px] font-semibold border', orgBadgeClasses]">
                  {{ orgLabel }}
                </span>
              </div>
              <!-- Logout -->
              <button @click="logout" title="로그아웃"
                class="p-1.5 rounded-lg text-gray-400 hover:text-red-500 hover:bg-gray-100 transition-colors flex-shrink-0">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                  <polyline points="16 17 21 12 16 7"/>
                  <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
              </button>
            </div>
          </div>
        </aside>

        <!-- ===== MAIN AREA ===== -->
        <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

          <!-- Top Bar -->
          <header class="h-14 bg-white border-b border-gray-200 flex items-center justify-between px-4 lg:px-6 flex-shrink-0">
            <!-- Left: hamburger (mobile) + page title -->
            <div class="flex items-center space-x-3">
              <!-- Mobile hamburger -->
              <button @click="mobileMenuOpen = !mobileMenuOpen"
                class="lg:hidden p-1.5 -ml-1.5 rounded-lg text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition-colors">
                <svg v-if="!mobileMenuOpen" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="3" y1="6" x2="21" y2="6"/>
                  <line x1="3" y1="12" x2="21" y2="12"/>
                  <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
                <svg v-else width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="18" y1="6" x2="6" y2="18"/>
                  <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>
              <!-- Breadcrumb -->
              <nav class="flex items-center space-x-1.5 text-sm">
                <span class="text-gray-400 hidden sm:inline">Battery Passport</span>
                <svg class="w-3.5 h-3.5 text-gray-300 hidden sm:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="9 18 15 12 9 6"/>
                </svg>
                <span class="text-gray-900 font-semibold">{{ currentPageTitle }}</span>
              </nav>
            </div>

            <!-- Right: connection status -->
            <div class="flex items-center space-x-2">
              <div :class="['flex items-center space-x-1.5 px-2.5 py-1 rounded-full border',
                fabricStatus === 'connected' ? 'bg-emerald-50 border-emerald-200' :
                fabricStatus === 'checking' ? 'bg-amber-50 border-amber-200' :
                'bg-red-50 border-red-200']">
                <span class="relative flex h-2 w-2">
                  <span v-if="fabricStatus === 'connected'" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span :class="['relative inline-flex rounded-full h-2 w-2',
                    fabricStatus === 'connected' ? 'bg-emerald-500' :
                    fabricStatus === 'checking' ? 'bg-amber-500' :
                    'bg-red-500']"></span>
                </span>
                <span :class="['text-xs font-medium hidden sm:inline',
                  fabricStatus === 'connected' ? 'text-emerald-700' :
                  fabricStatus === 'checking' ? 'text-amber-700' :
                  'text-red-700']">
                  {{ fabricStatus === 'connected' ? 'Fabric 연결됨' : fabricStatus === 'checking' ? '확인 중...' : 'Fabric 연결 끊김' }}
                </span>
              </div>
            </div>
          </header>

          <!-- Content Area -->
          <main class="flex-1 overflow-y-auto">
            <div class="max-w-screen-2xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
              <component :is="currentPageComponent"
                :auth="auth"
                :api="api"
                @navigate="navigate"
                @login="onLogin">
              </component>
            </div>
          </main>
        </div>
      </div>
    </template>

    <!-- Toast Notifications -->
    <div class="fixed top-4 right-4 z-[100] space-y-2">
      <div v-for="(toast, i) in toasts" :key="i"
        :class="['px-4 py-3 rounded-lg shadow-lg text-white text-sm transition-all flex items-center space-x-2',
          toast.type === 'error' ? 'bg-red-500' : toast.type === 'success' ? 'bg-emerald-500' : 'bg-emerald-600']">
        <svg v-if="toast.type === 'success'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <svg v-else-if="toast.type === 'error'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <svg v-else width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="16" x2="12" y2="12"/>
          <line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
        <span>{{ toast.message }}</span>
      </div>
    </div>
  </div>

  <!-- App instance (creates `app` variable) -->
  <script src="app.js"></script>
  <!-- Page Components (register on `app` via app.component()) -->
  <script src="pages/login.js"></script>
  <script src="pages/dashboard.js"></script>
  <script src="pages/passports.js"></script>
  <script src="pages/passport-detail.js"></script>
  <script src="pages/materials.js"></script>
  <script src="pages/bmu-data.js"></script>
  <script src="pages/maintenance.js"></script>
  <script src="pages/recycling.js"></script>
  <script src="pages/qr-scan.js"></script>
  <script src="pages/audit-log.js"></script>
  <!-- Mount after all components are registered -->
  <script>
    // Expose global constants to all Vue templates
    app.config.globalProperties.MSP = MSP;
    app.config.globalProperties.MSP_LABELS = MSP_LABELS;
    app.config.globalProperties.STATUS_LIST = STATUS_LIST;
    app.config.globalProperties.STATUS_LABELS = STATUS_LABELS;
    app.config.globalProperties.STATUS_CONFIG = STATUS_CONFIG;
    app.config.globalProperties.getStatusBadge = getStatusBadge;
    app.config.globalProperties.scaleSOC = scaleSOC;
    app.config.globalProperties.scaleTemp = scaleTemp;
    app.config.globalProperties.retryOnConflict = retryOnConflict;
    app.mount('#app');
  </script>
</body>
</html>
