<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battery Passport Platform</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [v-cloak] { display: none; }
    .fade-enter-active, .fade-leave-active { transition: opacity 0.2s; }
    .fade-enter-from, .fade-leave-to { opacity: 0; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a' },
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="app" v-cloak>
    <!-- Top Navigation -->
    <nav v-if="auth.token" class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-40">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
          <!-- Left: Logo + Nav -->
          <div class="flex items-center space-x-8">
            <!-- Logo -->
            <div class="flex items-center space-x-2.5 cursor-pointer group" @click="navigate('dashboard')">
              <div class="w-8 h-8 bg-primary-600 rounded-lg flex items-center justify-center group-hover:bg-primary-700 transition-colors">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="6" y="2" width="12" height="20" rx="2" ry="2"/>
                  <line x1="6" y1="6" x2="18" y2="6"/>
                  <line x1="6" y1="18" x2="18" y2="18"/>
                  <path d="M12 9v6" stroke="white" stroke-width="2"/>
                  <path d="M9 12h6" stroke="white" stroke-width="2"/>
                </svg>
              </div>
              <span class="text-lg font-bold text-gray-900 hidden sm:block">Battery Passport</span>
            </div>

            <!-- Desktop Nav -->
            <div class="hidden md:flex items-center space-x-1">
              <button v-for="item in navItems" :key="item.route"
                @click="navigate(item.route)"
                :class="['relative px-3 py-2 text-sm font-medium rounded-md transition-all duration-150',
                  currentPage === item.route
                    ? 'text-primary-700 bg-primary-50'
                    : 'text-gray-600 hover:text-gray-900 hover:bg-gray-100']">
                {{ item.label }}
                <span v-if="currentPage === item.route"
                  class="absolute bottom-0 left-1/2 -translate-x-1/2 w-4/5 h-0.5 bg-primary-600 rounded-full"
                  style="bottom: -5px;"></span>
              </button>
            </div>
          </div>

          <!-- Right: User info + Logout + Mobile menu button -->
          <div class="flex items-center space-x-3">
            <!-- User Info (desktop) -->
            <div class="hidden sm:flex items-center space-x-3">
              <div class="flex items-center space-x-2 px-3 py-1.5 bg-gray-50 rounded-lg border border-gray-200">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
                <span class="text-sm font-medium text-gray-700">{{ auth.userId }}</span>
                <span :class="[
                  'ml-1 px-2 py-0.5 rounded-full text-xs font-semibold border',
                  auth.orgMsp === 'ManufacturerMSP' ? 'bg-blue-50 text-blue-700 border-blue-200' :
                  auth.orgMsp === 'EVManufacturerMSP' ? 'bg-purple-50 text-purple-700 border-purple-200' :
                  auth.orgMsp === 'ServiceMSP' ? 'bg-amber-50 text-amber-700 border-amber-200' :
                  auth.orgMsp === 'RegulatorMSP' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' :
                  'bg-gray-50 text-gray-700 border-gray-200'
                ]">{{ orgLabel }}</span>
              </div>
              <button @click="logout"
                class="flex items-center space-x-1.5 px-3 py-1.5 text-sm text-gray-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors border border-transparent hover:border-red-200">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                  <polyline points="16 17 21 12 16 7"/>
                  <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                <span>로그아웃</span>
              </button>
            </div>

            <!-- Mobile menu toggle -->
            <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden p-2 rounded-lg text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition-colors">
              <svg v-if="!mobileMenuOpen" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
              </svg>
              <svg v-else width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Active page indicator line -->
      <div class="hidden md:block h-0.5 bg-transparent relative">
        <!-- The indicator is rendered via the per-button span above -->
      </div>

      <!-- Mobile menu -->
      <div v-if="mobileMenuOpen" class="md:hidden border-t border-gray-200 bg-white">
        <div class="px-4 py-3 space-y-1">
          <button v-for="item in navItems" :key="item.route"
            @click="navigate(item.route); mobileMenuOpen = false;"
            :class="['flex w-full items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors',
              currentPage === item.route
                ? 'text-primary-700 bg-primary-50'
                : 'text-gray-600 hover:text-gray-900 hover:bg-gray-50']">
            <span :class="['w-1.5 h-1.5 rounded-full mr-3', currentPage === item.route ? 'bg-primary-600' : 'bg-gray-300']"></span>
            {{ item.label }}
          </button>
        </div>
        <!-- Mobile user info -->
        <div class="px-4 py-3 border-t border-gray-100 flex items-center justify-between">
          <div class="flex items-center space-x-2">
            <span class="text-sm font-medium text-gray-700">{{ auth.userId }}</span>
            <span :class="[
              'px-2 py-0.5 rounded-full text-xs font-semibold border',
              auth.orgMsp === 'ManufacturerMSP' ? 'bg-blue-50 text-blue-700 border-blue-200' :
              auth.orgMsp === 'EVManufacturerMSP' ? 'bg-purple-50 text-purple-700 border-purple-200' :
              auth.orgMsp === 'ServiceMSP' ? 'bg-amber-50 text-amber-700 border-amber-200' :
              auth.orgMsp === 'RegulatorMSP' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' :
              'bg-gray-50 text-gray-700 border-gray-200'
            ]">{{ orgLabel }}</span>
          </div>
          <button @click="logout" class="text-sm text-red-500 hover:text-red-700 font-medium">로그아웃</button>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main :class="auth.token ? 'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6' : ''">
      <component :is="currentPageComponent"
        :auth="auth"
        :api="api"
        @navigate="navigate"
        @login="onLogin">
      </component>
    </main>

    <!-- Toast Notifications -->
    <div class="fixed top-4 right-4 z-50 space-y-2">
      <div v-for="(toast, i) in toasts" :key="i"
        :class="['px-4 py-3 rounded-lg shadow-lg text-white text-sm transition-all flex items-center space-x-2',
          toast.type === 'error' ? 'bg-red-500' : toast.type === 'success' ? 'bg-green-500' : 'bg-blue-500']">
        <svg v-if="toast.type === 'success'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <svg v-else-if="toast.type === 'error'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <svg v-else width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="16" x2="12" y2="12"/>
          <line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
        <span>{{ toast.message }}</span>
      </div>
    </div>
  </div>

  <!-- App instance (creates `app` variable) -->
  <script src="app.js"></script>
  <!-- Page Components (register on `app` via app.component()) -->
  <script src="pages/login.js"></script>
  <script src="pages/dashboard.js"></script>
  <script src="pages/passports.js"></script>
  <script src="pages/passport-detail.js"></script>
  <script src="pages/materials.js"></script>
  <script src="pages/bmu-data.js"></script>
  <script src="pages/maintenance.js"></script>
  <script src="pages/recycling.js"></script>
  <!-- Mount after all components are registered -->
  <script>app.mount('#app');</script>
</body>
</html>
