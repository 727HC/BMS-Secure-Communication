name: Sensitive marker scan

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  sensitive-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Run high-signal sensitive marker scan
        run: python3 scripts/check-sensitive-patterns.py

      - name: Run GitHub PR metadata sensitive marker scan for current PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          python3 scripts/scan-github-pr-metadata-sensitive.py
          --repo "$GITHUB_REPOSITORY"
          --pr-number "${{ github.event.pull_request.number }}"

      - name: Run GitHub PR metadata sensitive marker scan for pushed branch PR
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          python3 scripts/scan-github-pr-metadata-sensitive.py
          --repo "$GITHUB_REPOSITORY"
          --head-ref "$GITHUB_REF_NAME"
          --allow-empty

      - name: Run GitHub PR metadata sensitive marker scan for all open PRs
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          python3 scripts/scan-github-pr-metadata-sensitive.py
          --repo "$GITHUB_REPOSITORY"
          --state open
