version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "npm"
    directories:
      - "/bmu-agent"
      - "/cloud-agent"
      - "/e2e-tests"
      - "/mcp-monitor"
      - "/webapp/frontend-react"
      - "/wiki-mcp"
    schedule:
      interval: "monthly"
      timezone: "Asia/Seoul"
    # Version-update PRs are disabled for npm to avoid noisy public branches.
    # Security alerts are reviewed separately.
    open-pull-requests-limit: 0
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "gomod"
    directory: "/chaincode/passport-contract"
    schedule:
      interval: "monthly"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "chore"
      include: "scope"
