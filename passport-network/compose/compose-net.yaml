      - CORE_PEER_ADDRESS=peer0.service.battery.com:11051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:11051
      - CORE_PEER_CHAINCODEADDRESS=peer0.service.battery.com:11052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:11052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.service.battery.com:11051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.service.battery.com:11051
      - CORE_PEER_LOCALMSPID=ServiceMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.service.battery.com:9446
      - CORE_METRICS_PROVIDER=prometheus
      - CHAINCODE_AS_A_SERVICE_BUILDER_CONFIG={"peername":"peer0service"}
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
