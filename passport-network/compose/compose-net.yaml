      - CORE_PEER_CHAINCODEADDRESS=peer0.evmanufacturer.battery.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.evmanufacturer.battery.com:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.evmanufacturer.battery.com:9051
      - CORE_PEER_LOCALMSPID=EVManufacturerMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.evmanufacturer.battery.com:9445
      - CORE_METRICS_PROVIDER=prometheus
      - CHAINCODE_AS_A_SERVICE_BUILDER_CONFIG={"peername":"peer0evmanufacturer"}
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=passport_net
    volumes:
      # DEV-ONLY: Docker socket grants host-level control for chaincode-as-a-service builds. Do not use this mount in production profiles.
