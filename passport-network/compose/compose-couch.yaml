# CouchDB for Battery Passport 4-org Network
# LevelDB에서는 rich query(GetQueryResult)를 지원하지 않으므로
# DID→passport 조회 등에 CouchDB가 필수
#
# 크레덴셜은 .env 또는 셸 환경변수로 주입해야 함:
#   COUCHDB_USER, COUCHDB_PASSWORD
# 포트는 호스트에 노출하지 않음 (peer 컨테이너에서만 접근)

# Named CouchDB data volumes: without these the couchdb:3.4.2 image's
# `VOLUME /opt/couchdb/data` creates a fresh anonymous volume on every container
# (re)creation, orphaning the previous one. Naming them makes each network rebuild
# reuse the same volume instead of accumulating orphans across reset cycles.
# CouchDB state is rebuildable from the peer ledger, so reusing/recreating these is safe.
volumes:
  couchdb0:
  couchdb1:
  couchdb2:
  couchdb3:

networks:
  passport:
    name: passport_net

services:

  couchdb0:
    container_name: couchdb0
    image: couchdb:3.4.2
    labels:
      service: hyperledger-fabric
    environment:
      - COUCHDB_USER=${COUCHDB_USER:?COUCHDB_USER must be set}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:?COUCHDB_PASSWORD must be set}
    networks:
      - passport
    volumes:
      - couchdb0:/opt/couchdb/data

  peer0.manufacturer.battery.com:
    environment:
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=${COUCHDB_USER:?COUCHDB_USER must be set}
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASSWORD:?COUCHDB_PASSWORD must be set}
    depends_on:
      - couchdb0

  couchdb1:
    container_name: couchdb1
    image: couchdb:3.4.2
    labels:
      service: hyperledger-fabric
    environment:
      - COUCHDB_USER=${COUCHDB_USER:?COUCHDB_USER must be set}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:?COUCHDB_PASSWORD must be set}
    networks:
      - passport
    volumes:
      - couchdb1:/opt/couchdb/data

  peer0.evmanufacturer.battery.com:
    environment:
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=${COUCHDB_USER:?COUCHDB_USER must be set}
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASSWORD:?COUCHDB_PASSWORD must be set}
    depends_on:
      - couchdb1

  couchdb2:
    container_name: couchdb2
    image: couchdb:3.4.2
    labels:
      service: hyperledger-fabric
    environment:
      - COUCHDB_USER=${COUCHDB_USER:?COUCHDB_USER must be set}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:?COUCHDB_PASSWORD must be set}
    networks:
      - passport
    volumes:
      - couchdb2:/opt/couchdb/data

  peer0.service.battery.com:
    environment:
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb2:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=${COUCHDB_USER:?COUCHDB_USER must be set}
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASSWORD:?COUCHDB_PASSWORD must be set}
    depends_on:
      - couchdb2

  couchdb3:
    container_name: couchdb3
    image: couchdb:3.4.2
    labels:
      service: hyperledger-fabric
    environment:
      - COUCHDB_USER=${COUCHDB_USER:?COUCHDB_USER must be set}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:?COUCHDB_PASSWORD must be set}
    networks:
      - passport
    volumes:
      - couchdb3:/opt/couchdb/data

  peer0.regulator.battery.com:
    environment:
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb3:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=${COUCHDB_USER:?COUCHDB_USER must be set}
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASSWORD:?COUCHDB_PASSWORD must be set}
    depends_on:
      - couchdb3
