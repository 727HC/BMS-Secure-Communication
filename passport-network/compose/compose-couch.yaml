# CouchDB for Battery Passport 4-org Network
# LevelDB에서는 rich query(GetQueryResult)를 지원하지 않으므로
# DID→passport 조회 등에 CouchDB가 필수

networks:
  passport:
    name: passport_net

services:

  couchdb0:
    container_name: couchdb0
    image: couchdb:3.4.2
    labels:
      service: hyperledger-fabric
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=REMOVED_SECRET_ROTATED_2026_04_18
    ports:
      - "5984:5984"
    networks:
      - passport

  peer0.manufacturer.battery.com:
    environment:
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=REMOVED_SECRET_ROTATED_2026_04_18
    depends_on:
      - couchdb0

  couchdb1:
    container_name: couchdb1
    image: couchdb:3.4.2
    labels:
      service: hyperledger-fabric
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=REMOVED_SECRET_ROTATED_2026_04_18
    ports:
      - "7984:5984"
    networks:
      - passport

  peer0.evmanufacturer.battery.com:
    environment:
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=REMOVED_SECRET_ROTATED_2026_04_18
    depends_on:
      - couchdb1

  couchdb2:
    container_name: couchdb2
    image: couchdb:3.4.2
    labels:
      service: hyperledger-fabric
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=REMOVED_SECRET_ROTATED_2026_04_18
    ports:
      - "9984:5984"
    networks:
      - passport

  peer0.service.battery.com:
    environment:
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb2:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=REMOVED_SECRET_ROTATED_2026_04_18
    depends_on:
      - couchdb2

  couchdb3:
    container_name: couchdb3
    image: couchdb:3.4.2
    labels:
      service: hyperledger-fabric
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=REMOVED_SECRET_ROTATED_2026_04_18
    ports:
      - "11984:5984"
    networks:
      - passport

  peer0.regulator.battery.com:
    environment:
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb3:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=REMOVED_SECRET_ROTATED_2026_04_18
    depends_on:
      - couchdb3
