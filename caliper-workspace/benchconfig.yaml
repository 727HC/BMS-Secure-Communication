test:
  name: Battery Passport TPS Benchmark
  description: KPI measurement - Write 150+ TPS, Read 1500+ TPS
  workers:
    number: 10
  rounds:
    - label: write-bmu-data
      description: RecordBMUData write - Target 150+ TPS
      txNumber: 3000
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workloads/recordBMUData.js

    - label: read-passport
      description: Single passport query (GetState) - Target 1500+ TPS
      txNumber: 10000
      rateControl:
        type: fixed-rate
        opts:
          tps: 1800
      workload:
        module: workloads/queryPassport.js
