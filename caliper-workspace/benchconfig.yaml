test:
  name: Battery Passport TPS Benchmark
  description: KPI measurement - Write WRITE_TARGET_TPS_PLACEHOLDER+ TPS, Read READ_TARGET_TPS_PLACEHOLDER+ TPS
  workers:
    number: WORKER_COUNT_PLACEHOLDER
  rounds:
    - label: write-bmu-data
      description: RecordBMUData write - Target WRITE_TARGET_TPS_PLACEHOLDER+ TPS
      txNumber: WRITE_TX_NUMBER_PLACEHOLDER
      rateControl:
        type: WRITE_RATE_CONTROL_TYPE_PLACEHOLDER
        opts:
WRITE_RATE_CONTROL_OPTS_PLACEHOLDER
      workload:
        module: workloads/recordBMUData.js

    - label: read-passport
      description: Single passport query (GetState) - Target READ_TARGET_TPS_PLACEHOLDER+ TPS
      txNumber: READ_TX_NUMBER_PLACEHOLDER
      rateControl:
        type: fixed-rate
        opts:
          tps: READ_TARGET_TPS_PLACEHOLDER
      workload:
        module: workloads/queryPassport.js
